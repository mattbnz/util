<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Join the song game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 3rem auto; padding: 0 1rem; }
  h1 { margin-bottom: 0.5rem; }
  form { display: flex; gap: 0.5rem; margin-top: 1rem; }
  input[type=text] { flex: 1; padding: 0.6rem; font-size: 1rem; border: 1px solid #999; border-radius: 4px; }
  button { padding: 0.6rem 1rem; font-size: 1rem; background: #1db954; color: white; border: 0; border-radius: 4px; cursor: pointer; }
  button:hover { background: #169c46; }
  p.hint { color: #666; }
</style>
</head>
<body>
  <h1>Guess that song</h1>
  <p class="hint">Enter your name to join.</p>
  <form method="post" action="/join">
    <input type="text" name="name" placeholder="Your name" autofocus required maxlength="40">
    <button type="submit">Join</button>
  </form>
</body>
</html>
